name: release

# Gated on the `test` workflow — triggering on `push:master` directly
# would race: semantic-release pushes a changelog commit + tag before
# `go test + vet` finishes, and master's branch protection rejects it
# with GH006 ("Required status check ... is expected"). `workflow_run`
# fires once test.yml completes; the `if:` on each job filters to
# successful test runs so a broken master still blocks the release.
# Manual dispatch stays available for emergency re-runs.
on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [master]
  workflow_dispatch:

# semantic-release needs to push a tag + the changelog commit.
# The docker job needs to push a package to GHCR.
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # Only proceed when tests succeeded (workflow_run path) or when
    # manually re-triggered (workflow_dispatch has no workflow_run event
    # attached — conclusion would be empty, so gate on the trigger too).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version:   ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # semantic-release walks every commit since the last tag, so
          # it needs the full history. fetch-depth: 0 is the standard.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; persist-credentials lets the
          # @semantic-release/git plugin push the changelog commit.
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        with:
          # Pin to a known-good major. Plugins listed here mirror
          # .releaserc.json so the action installer picks them up
          # without needing a package.json in the repo.
          #
          # conventional-changelog-conventionalcommits is the preset
          # backing the `conventionalcommits` config in .releaserc.json
          # (the analyzer + notes generator look it up by name at
          # runtime, so it must be in node_modules even though we
          # never import it directly).
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    name: build + upload release binaries
    runs-on: ubuntu-latest
    needs: release
    # Skip when semantic-release didn't cut a new version — nothing to
    # attach to. Parallel with the docker job (both gated on the same
    # output) so a failing binary build doesn't block the image push.
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write  # upload assets to the release
    strategy:
      # fail-fast off: if one platform breaks, still get assets for the
      # others uploaded so users aren't blocked by a single bad target.
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          # semantic-release pushed v${version} (tag) + a changelog commit.
          # Check out the tag so -X main.Version matches what users install.
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: v${{ needs.release.outputs.new_release_version }}
        working-directory: go
        run: |
          mkdir -p ../bin
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "../bin/forty-two-watts-${GOOS}-${GOARCH}${{ matrix.ext }}" \
            ./cmd/forty-two-watts
          ls -la "../bin/forty-two-watts-${GOOS}-${GOARCH}${{ matrix.ext }}"

      - name: Package
        env:
          PLATFORM: ${{ matrix.goos }}-${{ matrix.goarch }}
          BINARY: forty-two-watts-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          mkdir -p release
          if [[ "${ARCHIVE}" == "zip" ]]; then
            (cd bin && zip -q "../release/forty-two-watts-${PLATFORM}.zip" "${BINARY}")
            zip -qr "release/forty-two-watts-${PLATFORM}.zip" drivers web config.example.yaml
          else
            tar czf "release/forty-two-watts-${PLATFORM}.tar.gz" \
              -C bin "${BINARY}" \
              -C .. drivers web config.example.yaml
          fi
          ls -la release/

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.release.outputs.new_release_version }}
          ASSET: release/forty-two-watts-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
        # --clobber lets a workflow re-run replace a prior upload without
        # failing — useful when semantic-release is re-triggered manually.
        run: gh release upload "${TAG}" "${ASSET}" --clobber

  docker:
    name: docker build + push
    runs-on: ubuntu-latest
    needs: release
    # Only build if semantic-release actually cut a new version. Skipping
    # when there's no release keeps `:latest` deterministic — every
    # `:latest` corresponds to a real tagged version.
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Pull the tag semantic-release just pushed so the build sees
          # the new state of master (changelog commit included).
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>:<tag>
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=v${{ needs.release.outputs.new_release_version }}
            type=raw,value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=forty-two-watts
            org.opencontainers.image.description=Unified Home Energy Management System
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.new_release_version }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=v${{ needs.release.outputs.new_release_version }}
          # Use the GHA cache backend so subsequent builds reuse layers.
          cache-from: type=gha
          cache-to:   type=gha,mode=max
